services:
  postgres:
    image: postgres:15
    container_name: mlflow-postgres
    environment:
      POSTGRES_USER: mlflow_user
      POSTGRES_PASSWORD: mlflow_password
      POSTGRES_DB: mlflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mlflow-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow_user -d mlflow_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: mlflow-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - mlflow-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  trainer:
    build:
      context: .
      dockerfile: Dockerfile.trainer
    container_name: mlflow-trainer
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
    depends_on:
      - mlflow
      - minio
      - minio-setup
    networks:
      - mlflow-network
    restart: "no"

  minio-setup:
    image: minio/mc:latest
    container_name: minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin123;
      mc mb myminio/mlflow-artifacts --ignore-existing;
      echo 'Bucket mlflow-artifacts created';
      "
    networks:
      - mlflow-network
    restart: "no"

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow-server
    ports:
      - "5000:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://mlflow_user:mlflow_password@postgres:5432/mlflow_db
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
      MLFLOW_ARTIFACT_ROOT: s3://mlflow-artifacts/
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --allowed-hosts '*'
      --backend-store-uri postgresql://mlflow_user:mlflow_password@postgres:5432/mlflow_db
      --default-artifact-root s3://mlflow-artifacts/
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')" ]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
    - mlflow-network
    restart: unless-stopped

  fastapi-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi-service
    ports:
      - "8000:8000"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLSERVER_URL: http://mlserver:8080
    depends_on:
      mlflow:
        condition: service_healthy
      mlserver:
        condition: service_healthy
    networks:
      - mlflow-network
    restart: unless-stopped

  mlserver:
    build:
      context: .
      dockerfile: Dockerfile.mlserver
    container_name: mlserver-service
    ports:
      - "8080:8080"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
    volumes:
      - ./mlserver_config:/models
    command: mlserver start /models
    depends_on:
      mlflow:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - mlflow-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/v2/health/ready" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s



volumes:
  postgres_data:
  minio_data:

networks:
  mlflow-network:
    driver: bridge